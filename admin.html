<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utafiti Admin - Survey Results</title>

  <!-- Configuration (injected from .env.local) -->
  <script src="config.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebase config is injected from config.js
    const firebaseConfig = window.firebaseConfig || {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };

    if (!window.firebaseConfig) {
      console.error('❌ Firebase config not loaded. Make sure config.js is loaded.');
    }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.allResponses = [];

    const q = query(collection(db, "responses"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      window.allResponses = [];
      snapshot.forEach((doc) => {
        window.allResponses.push({ id: doc.id, ...doc.data() });
      });
      updateDashboard();
    });

    window.switchView = (view) => {
      document.getElementById('simple-view').style.display = view === 'simple' ? 'block' : 'none';
      document.getElementById('raw-view').style.display = view === 'raw' ? 'block' : 'none';

      document.getElementById('btn-simple').classList.toggle('active', view === 'simple');
      document.getElementById('btn-raw').classList.toggle('active', view === 'raw');
    };

    window.downloadExcel = () => {
      if (window.allResponses.length === 0) {
        alert('❌ No data to export');
        return;
      }

      try {
        const questions = {
          'q1': 'Region',
          'q2': 'Job Type',
          'q3': 'Housing Status',
          'q4': 'Monthly Rent',
          'q5': 'Search Methods',
          'q6': 'Time to Find',
          'q7': 'Used Agent',
          'q8': 'Agent Fee',
          'q9': 'Problems Faced',
          'q10': 'Scam Experience',
          'q10b': 'Amount Lost',
          'q11': 'Trust Factors',
          'q12': 'Escrow Payment',
          'q13': 'Phone Type',
          'q14': 'Apps Used',
          'q15': 'Website/App Experience',
          'q16': 'New App Interest',
          'q17': 'Important Features',
          'q17_other': 'Q17 Other Suggestion',
          'q18': 'Success Fee',
          'q19': 'Problem Severity',
          'q20': 'Comments',
          'q21_waitlist': 'Joined Waitlist',
          'q21_whatsapp': 'WhatsApp Number'
        };

        // Create CSV headers
        const headers = ['Response #', 'Date', ...Object.values(questions)];
        const csvContent = [];
        csvContent.push(headers.map(h => `"${h}"`).join(','));

        // Add data rows
        window.allResponses.forEach((response, index) => {
          const row = [];
          row.push(window.allResponses.length - index); // Response #

          // Date
          if (response.timestamp) {
            const date = new Date(response.timestamp.seconds * 1000);
            row.push(`"${date.toLocaleString('en-US')}"`);
          } else {
            row.push('""');
          }

          // Questions
          for (const key of Object.keys(questions)) {
            const value = response[key];
            let cellValue = '';
            if (value !== null && value !== undefined && value !== '') {
              cellValue = Array.isArray(value) ? value.join('; ') : String(value);
            }
            // Escape quotes and wrap in quotes
            cellValue = `"${cellValue.replace(/"/g, '""')}"`;
            row.push(cellValue);
          }

          csvContent.push(row.join(','));
        });

        // Create blob and download
        const csv = csvContent.join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

        const now = new Date();
        const filename = `Utafiti_Responses_${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}.csv`;

        const link = document.createElement('a');
        link.setAttribute('href', URL.createObjectURL(blob));
        link.setAttribute('download', filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        alert(`✅ Downloaded ${window.allResponses.length} responses`);
      } catch (error) {
        console.error('Download error:', error);
        alert('❌ Error downloading CSV: ' + error.message);
      }
    };

    function updateDashboard() {
      // Update stats
      document.getElementById('total-count').textContent = window.allResponses.length;

      // Update simple view
      updateSimpleView();

      // Update raw view
      updateRawView();
    }

    function updateSimpleView() {
      const container = document.getElementById('simple-responses');
      container.innerHTML = '';

      if (window.allResponses.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No responses yet</p>';
        return;
      }

      window.allResponses.forEach((response, index) => {
        const date = response.timestamp ? new Date(response.timestamp.seconds * 1000).toLocaleString('en-US') : 'Unknown';

        const card = document.createElement('div');
        card.className = 'simple-card';
        card.innerHTML = `
          <div class="card-header">
            <h3>Response #${window.allResponses.length - index}</h3>
            <span class="card-date">${date}</span>
          </div>
          <div class="card-content">
            ${getSimpleFields(response)}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function getSimpleFields(data) {
      const questions = {
        'q1': '📍 Region',
        'q2': '💼 Job Type',
        'q3': '🏠 Housing Status',
        'q4': '💰 Monthly Rent',
        'q5': '🔍 Search Methods',
        'q6': '⏱️ Time to Find',
        'q7': '🤝 Used Agent',
        'q8': '💵 Agent Fee',
        'q9': '⚠️ Problems Faced',
        'q10': '🚨 Scam Experience',
        'q10b': '💸 Amount Lost',
        'q11': '✅ Trust Factors',
        'q12': '🔐 Escrow Payment',
        'q13': '📱 Phone Type',
        'q14': '📲 Apps Used',
        'q15': '🌐 Website/App Experience',
        'q16': '🆕 New App Interest',
        'q17': '⭐ Important Features',
        'q17_other': '📝 Q17 Other',
        'q18': '💳 Success Fee',
        'q19': '📊 Problem Severity',
        'q20': '💭 Comments',
        'q21_waitlist': '🚀 Waitlist',
        'q21_whatsapp': '📞 WhatsApp'
      };

      for (const [key, label] of Object.entries(questions)) {
        if (key === 'q20') continue; // Handle separately
        const value = data[key];
        if (value !== null && value !== undefined && value !== '') {
          let displayValue = Array.isArray(value) ? value.join(', ') : value;
          html += `
            <div class="field">
              <strong>${label}:</strong>
              <span>${displayValue}</span>
            </div>
          `;
        }
      }

      // Highlight Comments at the end
      if (data['q20']) {
        html += `
          <div class="field feedback-highlight" style="background:#fdf6ec; padding:12px; border-radius:8px; margin-top:10px; border:1px solid #c8893a;">
            <strong style="color:#5c3d1e;">💭 Maoni/Feedback:</strong>
            <span style="display:block; margin-top:5px; font-style:italic;">"${data['q20']}"</span>
          </div>
        `;
      }

      return html || '<p style="color: #999;">No responses recorded</p>';
    }

    function updateRawView() {
      const container = document.getElementById('raw-responses');
      container.innerHTML = '';

      if (window.allResponses.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No responses yet</p>';
        return;
      }

      window.allResponses.forEach((response, index) => {
        const card = document.createElement('div');
        card.className = 'raw-card';
        card.innerHTML = `
          <div class="raw-header">
            <h3>Response #${window.allResponses.length - index}</h3>
            <button onclick="copyToClipboard('${response.id}')" class="copy-btn">📋 Copy ID</button>
          </div>
          <pre>${JSON.stringify(response, null, 2)}</pre>
        `;
        container.appendChild(card);
      });
    }

    window.copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ Copied to clipboard!');
      });
    };
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .stats-box {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      min-width: 200px;
      text-align: center;
    }

    .stat-card h2 {
      font-size: 32px;
      margin: 10px 0;
    }

    .stat-card p {
      font-size: 14px;
      opacity: 0.9;
    }

    .view-toggle {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      justify-content: center;
    }

    .view-btn {
      padding: 12px 24px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .view-btn.active {
      background: #667eea;
      color: white;
    }

    .view-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .view-btn.download-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: 2px solid transparent;
      margin-left: 10px;
    }

    .view-btn.download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    /* Simple View Styles */
    #simple-view {
      display: block;
    }

    #raw-view {
      display: none;
    }

    .simple-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }

    .simple-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h3 {
      font-size: 18px;
    }

    .card-date {
      font-size: 12px;
      opacity: 0.9;
    }

    .card-content {
      padding: 20px;
    }

    .field {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 15px;
    }

    .field:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .field strong {
      color: #667eea;
      font-weight: 600;
    }

    .field span {
      color: #333;
      word-break: break-word;
    }

    /* Raw View Styles */
    .raw-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .raw-header {
      background: #f5f5f5;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .raw-header h3 {
      color: #333;
      font-size: 16px;
    }

    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      background: #764ba2;
    }

    pre {
      background: #f9f9f9;
      padding: 20px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.4;
      color: #333;
      margin: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .field {
        grid-template-columns: 1fr;
      }

      .stats-box {
        flex-direction: column;
      }

      .stat-card {
        min-width: 100%;
      }

      .view-toggle {
        flex-direction: column;
      }

      .view-btn.download-btn {
        margin-left: 0;
        margin-top: 10px;
      }
    }
  </style>
</head>

<body>
  <div id="auth-overlay"
    style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--brown-d, #3D2510);z-index:9999;display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:20px">
    <div>
      <h1 style="color:white;margin-bottom:20px">🔐 Admin Access Protected</h1>
      <p id="auth-msg">Please enter the administrator password to continue.</p>
      <button onclick="checkAuth()"
        style="margin-top:20px;padding:12px 24px;background:#667eea;border:none;border-radius:8px;color:white;font-weight:600;cursor:pointer">Login
        to Dashboard</button>
    </div>
  </div>

  <script>
    function checkAuth() {
      const pass = prompt("Enter Admin Password:");
      // Simple hardcoded password as requested for 'simple protection'
      if (pass === "utafiti2026") {
        document.getElementById('auth-overlay').style.display = 'none';
        sessionStorage.setItem('admin_authed', 'true');
      } else {
        alert("❌ Incorrect password. Access denied.");
      }
    }

    // Check session
    if (sessionStorage.getItem('admin_authed') === 'true') {
      document.getElementById('auth-overlay').style.display = 'none';
    }
  </script>

  <div class="container">
    <div class="header">
      <h1>📊 Utafiti Survey Dashboard</h1>
      <p style="color: #666; margin-top: 5px;">Real-time survey response monitoring</p>

      <div class="stats-box">
        <div class="stat-card">
          <p>Total Responses</p>
          <h2 id="total-count">0</h2>
        </div>
      </div>

      <div class="view-toggle">
        <button class="view-btn active" id="btn-simple" onclick="switchView('simple')">👁️ Simple View</button>
        <button class="view-btn" id="btn-raw" onclick="switchView('raw')">💾 Raw Data</button>
        <button class="view-btn download-btn" onclick="downloadExcel()">📥 Download Data</button>
      </div>
    </div>

    <!-- Simple View -->
    <div id="simple-view">
      <div id="simple-responses"></div>
    </div>

    <!-- Raw View -->
    <div id="raw-view">
      <div id="raw-responses"></div>
    </div>
  </div>
</body>

</html>
